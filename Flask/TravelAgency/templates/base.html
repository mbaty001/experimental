<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Travel Planner{% endblock %}</title>
    <!-- Tailwind CSS via CDN for rapid utility styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans antialiased text-gray-900">

    <!-- Navigation Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <!-- Logo / Brand -->
                <div class="flex items-center">
                    <a href="{{ url_for('clients.list_clients_page') }}" class="flex items-center space-x-2">
                        <span class="text-2xl">✈️</span>
                        <span class="text-xl font-bold tracking-tight text-indigo-600">TravelPlanner</span>
                    </a>
                </div>

                <!-- Navigation Links -->
                <nav class="flex space-x-8">
                    <a href="{{ url_for('clients.list_clients_page') }}" 
                       class="text-sm font-medium text-gray-700 hover:text-indigo-600 border-b-2 border-transparent hover:border-indigo-500 pb-1 transition duration-150">
                        Clients
                    </a>
                    <a href="{{ url_for('itineraries.list_itineraries_page') }}" 
                       class="text-sm font-medium text-gray-700 hover:text-indigo-600 border-b-2 border-transparent hover:border-indigo-500 pb-1 transition duration-150">
                        Itineraries
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}
        <!-- Child templates will inject their content here -->
        {% endblock %}
    </main>

    <!-- Global Footer -->
    <footer class="bg-white border-t border-gray-200 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-500">
            &copy; 2025 TravelPlanner App. All rights reserved.
        </div>
    </footer>

    {% block scripts %}
    <!-- Child templates will inject custom scripts here -->
    {% endblock %}
</body>
</html>

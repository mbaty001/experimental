{% extends "base.html" %}

{% block title %}Add New Client{% endblock %}

{% block content %}
<div class="bg-white p-8 rounded-xl shadow-md max-w-md mx-auto border border-gray-100 my-10">
    <div class="mb-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-800">Add New Client</h1>
        <a href="{{ url_for('clients.list_clients_page') }}" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium">&larr; Back to List</a>
    </div>

    <div id="alert-box" class="hidden mb-4 p-3 rounded text-sm font-medium"></div>

    <form id="add-client-form" class="space-y-4">
        <div>
            <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">Full Name *</label>
            <input type="text" id="name" name="name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="John Doe">
        </div>
        <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Email Address *</label>
            <input type="email" id="email" name="email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="john@example.com">
        </div>
        <div>
            <label for="phone" class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
            <input type="tel" id="phone" name="phone" class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="+1 (555) 000-0000">
        </div>
        <div>
            <label for="address" class="block text-sm font-semibold text-gray-700 mb-1">Billing Address</label>
            <textarea id="address" name="address" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="123 Main St, City, Country"></textarea>
        </div>

        <div class="pt-4 flex space-x-3">
            <a href="{{ url_for('clients.list_clients_page') }}" class="w-1/2 text-center px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition font-medium">Cancel</a>
            <button type="submit" id="submit-btn" class="w-1/2 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">Save Client</button>
        </div>
    </form>
</div>

<script>
    document.getElementById('add-client-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const alertBox = document.getElementById('alert-box');
        const submitBtn = document.getElementById('submit-btn');

        const payload = {
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim(),
            phone: document.getElementById('phone').value.trim() || null,
            address: document.getElementById('address').value.trim() || null
        };

        alertBox.className = 'hidden';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving...';

        try {
            const response = await fetch("{{ url_for('clients.create_client_post') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.status === 201) {
                alertBox.textContent = 'Client added successfully! Redirecting...';
                alertBox.className = 'block mb-4 p-3 rounded text-sm font-medium bg-green-100 text-green-800';
                setTimeout(() => {
                    window.location.href = "{{ url_for('clients.list_clients_page') }}";
                }, 1000);
            } else {
                alertBox.textContent = data.message || 'Failed to create client.';
                alertBox.className = 'block mb-4 p-3 rounded text-sm font-medium bg-red-100 text-red-800';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save Client';
            }
        } catch (error) {
            console.error(error);
            alertBox.textContent = 'An unexpected server error occurred.';
            alertBox.className = 'block mb-4 p-3 rounded text-sm font-medium bg-red-100 text-red-800';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Save Client';
        }
    });
</script>
{% endblock %}
